name: knowledge-builder-ci

on:
  push:
    branches:
      - "**"

jobs:
  changes:
    name: Check diff for relevant changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            src:
              - "knowledge-builder/**/*"
              - ".github/workflows/knowledge-builder-ci.yml"
              - ".github/actions/setup-rust/**"

  test:
    name: Check code quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true'
    defaults:
      run:
        working-directory: ./knowledge-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: ruff check
        run: uv run ruff check

  check:
    name: Result
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - name: Check status
        if: needs.test.result == 'failure' || needs.test.result == 'cancelled'
        run: exit 1
      - name: Success
        run: echo "All checks passed."
