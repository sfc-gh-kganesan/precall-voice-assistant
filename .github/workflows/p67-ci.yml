name: p67-ci

on:
  push:
    branches:
      - "**"

jobs:
  changes:
    name: Check diff for relevant changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            src:
              - "p67/**/*"
              - ".github/workflows/p67-ci.yml"
              - ".github/actions/setup-node-js/**"

  test:
    name: Check code quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true'
    env:
      DATABASE_URL: postgres://dummy:dummy@localhost
    defaults:
      run:
        working-directory: ./p67

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-js
        with:
          node-version: 20
          pnpm-version: 10.22.0
          cache-dependency-path: ./p67/pnpm-lock.yaml
          working-directory: ./p67

      - name: Run CI checks
        run: pnpm run ci

  check:
    name: Result
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - name: Check status
        if: needs.test.result == 'failure' || needs.test.result == 'cancelled'
        run: exit 1
      - name: Success
        run: echo "All checks passed."
