name: p67-ci

on:
  push:
    branches:
      - "**"

jobs:
  changes:
    name: Check diff for relevant changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            src:
              - "p67/**/*"
              - ".github/workflows/p67-ci.yml"

  test:
    name: Check code quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true'
    env:
      DATABASE_URL: postgres://dummy:dummy@localhost
    defaults:
      run:
        working-directory: ./p67

    steps:
      - uses: oven-sh/setup-bun@v2

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: ./p67/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run CI checks
        run: pnpm run ci

  check:
    name: Result
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - name: Check status
        if: needs.test.result == 'failure' || needs.test.result == 'cancelled'
        run: exit 1
      - name: Success
        run: echo "All checks passed."
