name: p67-ci

on:
  push:
    branches:
      - "**"
    paths:
      - "p67/**/*"
      - ".github/workflows/p67-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://dummy:dummy@localhost
    defaults:
      run:
        working-directory: ./p67

    steps:
      - uses: oven-sh/setup-bun@v2

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: ./p67/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run CI checks
        run: pnpm run ci
