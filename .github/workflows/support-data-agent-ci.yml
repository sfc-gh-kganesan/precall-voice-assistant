name: support-data-agent-ci

on:
  push:
    branches:
      - "**"

jobs:
  changes:
    name: Check diff for relevant changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            src:
              - "support-data-agent/**/*"
              - ".github/workflows/support-data-agent-ci.yml"

  test:
    name: Check code quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: support-data-agent/360app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: support-data-agent/360app/frontend
        run: npm ci

      - name: Lint backend
        working-directory: support-data-agent/360app/backend
        run: uv run ruff check

      - name: Lint frontend
        working-directory: support-data-agent/360app/frontend
        run: npm run lint

  check:
    name: Result
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - name: Check status
        if: needs.test.result == 'failure' || needs.test.result == 'cancelled'
        run: exit 1
      - name: Success
        run: echo "All checks passed."
