name: invoiceiq-dashboard-ci

on:
  push:
    branches:
      - "**"
    paths:
      - "invoiceiq/ui/dashboard/**/*"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "invoiceiq/ui/dashboard/package-lock.json"

      - name: Install dependencies
        working-directory: invoiceiq/ui/dashboard
        run: npm ci

      - name: Run checks
        working-directory: invoiceiq/ui/dashboard
        run: npm run check

