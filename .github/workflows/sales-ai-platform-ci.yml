name: sales-ai-platform-ci

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  changes:
    name: Check diff for relevant changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            src:
              - "sales-ai-platform/**/*"
              - ".github/workflows/sales-ai-platform-ci.yml"

  test:
    name: Check code quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run code quality checks
        working-directory: sales-ai-platform
        run: just check

  check:
    name: Result
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - name: Check status
        if: needs.test.result == 'failure' || needs.test.result == 'cancelled'
        run: exit 1
      - name: Success
        run: echo "All checks passed."
