name: p67-migrate-db
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run mode"
        required: true
        type: boolean
        default: true

jobs:
  setup:
    name: Setup environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-js
        with:
          node-version: 20
          pnpm-version: 10.22.0
          cache-dependency-path: ./p67/pnpm-lock.yaml
          working-directory: ./p67

  deploy:
    name: Run prod db migration
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ inputs.dry-run == false }}
    defaults:
      run:
        working-directory: ./p67/packages/db
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-js
        with:
          node-version: 20
          pnpm-version: 10.22.0
          cache-dependency-path: ./p67/pnpm-lock.yaml
          working-directory: ./p67

      - name: Apply all pending migrations to the database
        run: make deploy
        env:
          DATABASE_URL: ${{ secrets.P67_POSTGRES_URL_SFENGINEERING_AIFDE }}

  dryrun:
    name: Print sql changes only
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ inputs.dry-run == true }}
    defaults:
      run:
        working-directory: ./p67/packages/db
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Print SQL diff
        run: make diff
        env:
          DATABASE_URL: ${{ secrets.P67_POSTGRES_URL_SFENGINEERING_AIFDE }}
