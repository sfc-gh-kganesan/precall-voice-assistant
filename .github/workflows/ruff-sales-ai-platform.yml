name: Sales AI Platform - CI

on:
  push:
    branches:
      - "**"
    paths:
      - 'sales-ai-platform/**'
  pull_request:
    paths:
      - 'sales-ai-platform/**'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    name: Code Quality Check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Install just
        uses: extractions/setup-just@v3
      
      - name: Run code quality checks
        working-directory: sales-ai-platform
        run: just check

