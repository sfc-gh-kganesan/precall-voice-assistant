verified_queries:
  - name: What are all of the services that were either deleted or suspended in the last week, excluding services that were later resumed?
    question: What are all of the services that were either deleted or suspended in the last week, excluding services that were later resumed?
    sql: |-
      with currently_active_services as (
        select
          c.id,
          a.salesforce_account_name,
          c.cortexnumrowsread,
          c.dpo ['CortexSearchServiceDPO:primary'] ['definition']::text as source_query,
          c.dpo,
          coalesce(
            date_trunc(
              'day',
              to_timestamp(
                c.dpo ['CortexSearchServiceDPO:primary'] ['servingSuspendedOn']::integer,
                3
              )
            )::date,
            NULL
          ) as suspended_on_date,
        from
          snowscience.llm.cortex_search_daily_active_services c
          left join snowscience.dimensions.dim_snowflake_accounts a on c.deployment = a.snowflake_deployment
          and c.account_id = a.snowflake_account_id
        where
          true
          and c.ds = current_date() - 1
          and suspended_on_date is null
          and snowflake_account_type in ('Customer', 'Partner')
      )
      select
        distinct -- c.ds,
        c.id,
        a.salesforce_account_name,
        c.cortexnumrowsread,
        c.dpo ['CortexSearchServiceDPO:primary'] ['definition']::text as source_query,
        coalesce(
          date_trunc(
            'day',
            to_timestamp(
              c.dpo ['CortexSearchServiceDPO:primary'] ['servingSuspendedOn']::integer,
              3
            )
          )::date,
          NULL
        ) as suspended_on_date,
        coalesce(
          date_trunc(
            'day',
            to_timestamp(
              c.dpo ['CortexSearchServiceDPO:primary'] ['deletedOn']::integer,
              3
            )
          )::date,
          NULL
        ) as deleted_on_date,
        c.created_on,
      from
        snowscience.llm.cortex_search_daily_active_services c
        left join snowscience.dimensions.dim_snowflake_accounts a on c.deployment = a.snowflake_deployment
        and c.account_id = a.snowflake_account_id
      where
        true
        and snowflake_account_type in ('Customer', 'Partner')
        and (
          current_date() - deleted_on_date < 8
          or current_date() - suspended_on_date < 8
        ) -- deleted or suspended in the last 7 days
        and id not in (
          select
            id
          from
            currently_active_services
        ) -- filter out services that are now serving active
      order by
        cortexnumrowsread desc;
    use_as_onboarding_question: false
    verified_by: David Taylor
    verified_at: 1755063007
  - name: What are the biggest services that were created in the last week, along with all relevant metadata?
    question: What are the biggest services that were created in the last week, along with all relevant metadata?
    sql: |-
      with l7_queries as(
          select
              payload['service_id'] as css_id,
              payload['account_id'] as account_id,
              count(*) as l7_query_count
          from snowscience.llm.cortex_search_usage 
          where ds >= current_date() - 8
          group by all
      )
      select
          -- c.ds,
                 c.created_on,
                 c.cortexnumrowsread,
                 a.salesforce_account_name,
                 CASE 
                      WHEN c.dpo['CortexSearchServiceDPO:primary']['servingSuspendedOn']::number > 0 THEN 'suspended'
                      ELSE 'active'
                 END AS serving_status,
                 c.name,
                 c.database,
                 c.schema,
                 q.l7_query_count,
                 c.account_id,
                 c.dpo['CortexSearchServiceDPO:primary']['definition']::text as source_query,
                 c.id as css_id,
                 a.salesforce_account_id,
                 c.deployment,
                 snowflake_account_type,
                 snowflake_account_name,
                 accts.sales_engineer_email,
                 accts.account_executive_email
          from snowscience.llm.cortex_search_daily_active_services c
          join snowscience.dimensions.dim_accounts_history a on c.deployment = a.snowflake_deployment 
                                                             and c.account_id = a.snowflake_account_id
                                                             and c.ds::date - 1 = a.general_date::date
          join l7_queries q on c.id = q.css_id and c.account_id = q.account_id
          left join SALES.ETM.ACCOUNT_TO_TERRITORY_ASSOCIATION accts
              on a.salesforce_account_id = accts.id
          where true
              and c.ds = (select max(ds) from snowscience.llm.cortex_search_daily_active_services c)
              and c.created_on >= current_date() - 8
              and snowflake_account_type in ('Customer', 'Partner')
              and accts.ds::date = current_date() - 1
          order by cortexnumrowsread desc;
    use_as_onboarding_question: false
    verified_by: David Taylor
    verified_at: 1764643135
  - name: What are the largest active serving services?
    question: What are the largest active serving services?
    sql: |-
      select 
         c.ds,
         c.id,
         a.salesforce_account_name,
         a.snowflake_account_name,
         a.snowflake_deployment,
         c.cortexnumrowsread,
