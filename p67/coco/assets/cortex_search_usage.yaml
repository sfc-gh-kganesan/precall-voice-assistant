      from snowscience.llm.cortex_search_daily_active_services c
      left join snowscience.dimensions.dim_snowflake_accounts a on c.deployment = a.snowflake_deployment 
                                                               and c.account_id = a.snowflake_account_id 
      where true
          and snowflake_account_type in ('Customer', 'Partner')
          and ds = (select max(ds) from snowscience.llm.cortex_search_daily_active_services)
          and suspended_on_date is null -- active services only
          order by cortexnumrowsread desc;
    use_as_onboarding_question: false
    verified_by: David Taylor
    verified_at: 1755063161
  - name: what are the biggest services that were dropped or suspended _in the last week_
    question: what are the biggest services that were dropped or suspended in the last week, along with all relevant metadata?
    sql: |-
      with currently_active_services as (
        select
          c.id,
          c.cortexnumrowsread,
          a.salesforce_account_name,
          c.dpo,
          coalesce(
            date_trunc(
              'day',
              to_timestamp(
                c.dpo ['CortexSearchServiceDPO:primary'] ['servingSuspendedOn']::integer,
                3
              )
            )::date,
            NULL
          ) as suspended_on_date,
          c.dpo ['CortexSearchServiceDPO:primary'] ['definition']::text as source_query,
        from
          snowscience.llm.cortex_search_daily_active_services c
          left join snowscience.dimensions.dim_snowflake_accounts a on c.deployment = a.snowflake_deployment
          and c.account_id = a.snowflake_account_id
        where
          true
          and c.ds = current_date() - 1
          and suspended_on_date is null
          and snowflake_account_type in ('Customer', 'Partner')
      )
      select
        distinct -- c.ds,
        c.id,
        max(c.cortexnumrowsread) as peak_cortexnumrowsread,
        a.salesforce_account_name,
        c.dpo ['CortexSearchServiceDPO:primary'] ['definition']::text as source_query,
        max(coalesce(
          date_trunc(
            'day',
            to_timestamp(
              c.dpo ['CortexSearchServiceDPO:primary'] ['servingSuspendedOn']::integer,
              3
            )
          )::date,
          NULL
        )) as serving_suspended_on_date,
        max(coalesce(
          date_trunc(
            'day',
            to_timestamp(
              c.dpo ['CortexSearchServiceDPO:primary'] ['deletedOn']::integer,
              3
            )
          )::date,
          NULL
        )) as deleted_on_date,
        c.created_on,
        c.database || '.' || c.schema || '.' || c.name as fqn,
        case  
              when
                  c.name ilike '_CORTEX_ANALYST_%' 
                  and source_query ilike '%DISTINCT%'
                  and regexp_like(right(c.name, 36), '[0-9A-Fa-f]{8}(_[0-9A-Fa-f]{4}){3}_[0-9A-Fa-f]{12}') = true
                  then 'LIKELY_ANALYST'
              when
                  source_query ilike any ('%chunk%','%agent%','%chat%','%llm%','%genai%','%_rag_%', '%.rag.%')
                      or fqn ilike any ('%chunk%','%agent%','%chat%','%llm%','%genai%''%_rag_%', '%.rag.%')
                   then 'LIKELY_RAG'
              else 'UNKNOWN'
             end as use_case_classification,
      from
        snowscience.llm.cortex_search_daily_active_services c
        left join snowscience.dimensions.dim_snowflake_accounts a on c.deployment = a.snowflake_deployment
        and c.account_id = a.snowflake_account_id
      where
        true
          and snowflake_account_type in ('Customer', 'Partner')
          and id not in (
              select
                id
              from
                currently_active_services
          ) -- filter out services that were suspended but are now serving active
      group by all
      having (
              current_date() - deleted_on_date <= 8
              or current_date() - serving_suspended_on_date <= 8
            ) -- deleted or suspended in the last 7 days
        order by
        peak_cortexnumrowsread desc 
      limit 50;
    use_as_onboarding_question: false
    verified_by: David Taylor
    verified_at: 1764642678
  - name: |
      Show the top 5 biggest "gainer" and top 5 biggest "loser" salesforce accounts over the past week based on the total credit consumption of the account of cortex search in the past week compared to the week prior. Provide all relevant metadata. This table should surface the top 5 biggest gainer accounts, ordered by `delta` descending, unioned with the top 5 biggest loser accounts, ordered by `delta` ascending.
    question: |
      Show the top 5 biggest "gainer" and top 5 biggest "loser" salesforce accounts over the past week based on the total credit consumption of the account of cortex search in the past week compared to the week prior. Provide all relevant metadata. This table should surface the top 5 biggest gainer accounts, ordered by `delta` descending, unioned with the top 5 biggest loser accounts, ordered by `delta` ascending.
    sql: |-
      with l14_daily as (
              select
                  ds,
                  a.salesforce_account_name,
                  a.salesforce_account_id,
                  round(sum(j.credits),2) as total_credits,
                  round(sum(case when j.segment = 'EMBED_TEXT Token Credits' then j.credits else 0 end), 2) as embed_text_token_credits,
                  round(sum(case when j.segment = 'DT Refresh Credits' then j.credits else 0 end), 2) as dt_refresh_credits,
                  round(sum(case when j.segment = 'Serving Credits' then j.credits else 0 end), 2) as serving_credits,
              from snowscience.llm.cortex_search_accounts_credits j
              join snowscience.dimensions.dim_accounts_history a on j.deployment = a.snowflake_deployment 
                                                                 and j.account_id = a.snowflake_account_id 
                                                                 and j.ds::date - 1 = a.general_date::date
              where true
                  and ds >= current_date() - 14
                  and snowflake_account_type in ('Customer', 'Partner')
              group by all
      ),
      l7_minus_7 as (
          select
              salesforce_account_name,
              salesforce_account_id,
              sum(total_credits) as l7_minus_7_total_credits,
              sum(embed_text_token_credits) as l7_minus_7_embed_text_token_credits,
              sum(dt_refresh_credits) as l7_minus_7_dt_refresh_credits,
              sum(serving_credits) as l7_minus_7_serving_credits
          from l14_daily
          where true
              and ds <= current_date() - 8
          group by all
      ),
      l7 as (
          select
              salesforce_account_name,
              salesforce_account_id,
              sum(total_credits) as l7_total_credits,
              sum(embed_text_token_credits) as l7_embed_text_token_credits,
              sum(dt_refresh_credits) as l7_dt_refresh_credits,
              sum(serving_credits) as l7_serving_credits
          from l14_daily
          where true
              and ds > current_date() - 8
          group by all
      ),
      winner as (
      select
          l7.salesforce_account_name,
          coalesce(l7_total_credits, 0) as l7_total_credits,
          l7_total_credits - coalesce(l7_minus_7_total_credits, 0) as delta,
          delta / nullif(l7_minus_7_total_credits, 0) as pct_change,
          accts.sales_engineer_email,
          l7.salesforce_account_id,
          is_cap1,
          agreement_type
      from l7
      left join l7_minus_7
          on l7.salesforce_account_id = l7_minus_7.salesforce_account_id
      left join SALES.ETM.ACCOUNT_TO_TERRITORY_ASSOCIATION accts
          on l7.salesforce_account_id = accts.id
      left join (
              select salesforce_account_id, max(is_cap1) is_cap1, max(agreement_type) agreement_type
              from finance.customer.snowflake_account_revenue
              where general_date::date = current_date() - 1 group by all
          ) acct_rev
          on l7.salesforce_account_id = acct_rev.salesforce_account_id
      where accts.ds::date = current_date() - 1
      order by delta desc
      limit 5
      ),
      loser as (
      select
          l7_minus_7.salesforce_account_name,
          coalesce(l7_total_credits, 0) as l7_total_credits,
          coalesce(l7_total_credits, 0) - l7_minus_7_total_credits as delta,
          delta / nullif(l7_minus_7_total_credits, 0) as pct_change,
          accts.sales_engineer_email,
          l7_minus_7.salesforce_account_id,
          is_cap1,
          agreement_type
      from l7_minus_7
      left join l7
          on l7.salesforce_account_id = l7_minus_7.salesforce_account_id
      left join SALES.ETM.ACCOUNT_TO_TERRITORY_ASSOCIATION accts
          on l7_minus_7.salesforce_account_id = accts.id
      left join (
              select salesforce_account_id, max(is_cap1) is_cap1, max(agreement_type) agreement_type
              from finance.customer.snowflake_account_revenue
              where general_date::date = current_date() - 1 group by all
          ) acct_rev
          on l7_minus_7.salesforce_account_id = acct_rev.salesforce_account_id
      where accts.ds::date = current_date() - 1
      order by delta asc
      limit 5
      )
      select * from winner union all select * from loser;
    use_as_onboarding_question: false
    verified_by: David Taylor
    verified_at: 1764643345
  - name: Provide a daily count of search requests by salesforce account for the last 30 days
    question: Provide a daily count of search requests by salesforce account for the last 30 days
    sql: |-
      with requests as (
          select distinct 
                 ds,
                 deployment,
                 payload:account_id as account_id,
                 request_id

          from snowscience.llm.cortex_search_usage 
      )
          select
              r.ds,
              --a.salesforce_account_id,
              a.salesforce_account_name,
              count(distinct r.request_id) as queries
          from requests r
          join snowscience.dimensions.dim_accounts_history a 
              on r.deployment = a.snowflake_deployment
              and r.account_id = a.snowflake_account_id
              and r.ds = a.general_date
              and current_date() - r.ds <= 30
          where true
              and a.salesforce_account_id is not null
              group by all
              order by ds desc, queries desc
    use_as_onboarding_question: false
    verified_by: David Taylor
    verified_at: 1764643662
  - name: Provide a daily breakdown of total Cortex Search credits by source for the past 30 days.
    question: Provide a daily breakdown of total Cortex Search credits by source for the past 30 days.
    sql: |
      with service_credits as (
          select c.ds,
                 c.deployment,
                 c.account_id,
                 c.service_id,
                 c.credits,
                 c.si_credits,
                 c.agent_credits,
                 c.analyst_credits,
                 c.direct_credits,
                 c.unattributed_credits
                 
          from snowscience.llm.cortex_search_accounts_credits c
          join snowscience.dimensions.dim_accounts_history a
              on c.deployment = a.snowflake_deployment
              and c.account_id = a.snowflake_account_id
              and c.ds = a.general_date
          where true
              and current_date() - c.ds <= 30
              and a.snowflake_account_type in ('Customer', 'Partner')
          group by all
      ),

      latest_service_metadata as (
          select distinct 
                 deployment,
                 account_id,
                 id,
                 dpo['CortexSearchServiceDPO:primary'] ['definition']::text as source_query,
                 case when (name ilike '_CORTEX_ANALYST_%' and source_query ilike '%DISTINCT%' and regexp_like(right(name, 36), '[0-9A-Fa-f]{8}(_[0-9A-Fa-f]{4}){3}_[0-9A-Fa-f]{12}') = true)
                      then true else false end as analyst_service
          from snowscience.llm.cortex_search_daily_active_services
          where ds = (select max(ds) from snowscience.llm.cortex_search_daily_active_services)
      )

      select c.ds,
             round(sum(c.credits)) as total,
             round(sum(c.si_credits)) as si,
             round(sum(c.agent_credits)) as agent,
             round(sum(c.direct_credits)) as direct,
             round(sum(case when c.unattributed_credits = c.credits -- when credits were not attributed to any sources
                          and analyst_service = true  -- and has analyst names
                          then c.credits else c.analyst_credits end)) as analyst,
             total - si - agent - direct - analyst as unattributed 
             
             
      from service_credits c
      left join latest_service_metadata s
          on c.deployment = s.deployment
          and c.account_id = s.account_id
          and c.service_id = s.id
      where c.ds >= '2025-11-10'
      group by all;
    use_as_onboarding_question: false
    verified_by: David Taylor
    verified_at: 1764643807
custom_instructions: |-
  - When the question says "user" or refers to a company, it usually is referring to "salesforce accounts" (`salesforce_account_name`)
  - When a user refers to a service size or the "biggest" or "smallest" services, it is referring to the `cortexnumrowsread ` field. The "largest consuming" usually refers to credits, which can be approximated with cortexnumrowsread