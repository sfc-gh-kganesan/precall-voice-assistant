        expr: DATABASE
        data_type: VARCHAR(16777216)
        cortex_search_service:
          database: ENG_CORTEXSEARCH
          schema: DT
          service: _CORTEX_ANALYST_CORTEX_SEARCH_DAILY_ACTIVE_SERVICES_DATABASE_A771ED10_F996_430B_8357_363AB68DD658
