name: cortex_search_usage
tables:
  - name: CORTEX_SEARCH_ACCOUNTS_CREDITS
    synonyms: []
    description: This table has the daily credit consumption by cortex search service, by credit segment,
    base_table:
      database: SNOWSCIENCE
      schema: LLM
      table: CORTEX_SEARCH_ACCOUNTS_CREDITS
    dimensions:
      - name: DEPLOYMENT
        synonyms:
          - deployment_type
          - environment
          - implementation
          - installation
          - instance
          - location
          - rollout
          - setup
          - site
        description: The region or environment where the account is deployed.
        expr: DEPLOYMENT
        data_type: VARCHAR(16777216)
        cortex_search_service:
          database: ENG_CORTEXSEARCH
          schema: DT
          service: _CORTEX_ANALYST_CORTEX_SEARCH_ACCOUNTS_CREDITS_DEPLOYMENT_FD7FAE4F_F2A5_4113_A324_4AC38770FA37
        sample_values:
          - awssaeast1
          - azeastus2prodshard2
          - awsuseast2
      - name: SEGMENT
        synonyms:
          - category
          - division
          - part
          - portion
          - section
          - slice
          - subgroup
          - subset
        description: The type of credits associated with a search account, such as credits used for data refresh, serving, or embedding text tokens.
        expr: SEGMENT
        data_type: VARCHAR(28)
        sample_values:
          - DT Refresh Credits
          - Serving Credits
          - EMBED_TEXT Token Credits
        is_enum: true
    time_dimensions:
      - name: DS
        synonyms:
          - creation_date
          - date
          - entry_date
          - log_date
          - record_date
          - timestamp
        description: Date of Service
        expr: DS
        data_type: DATE
        sample_values:
          - '2025-02-04'
          - '2025-08-06'
          - '2025-07-31'
    facts:
      - name: ACCOUNT_ID
        synonyms:
          - account_code
          - account_identifier
          - account_key
          - account_number
          - client_id
          - customer_id
          - user_id
        description: Unique identifier for a customer's account.
        expr: ACCOUNT_ID
        data_type: NUMBER(38,0)
        sample_values:
          - '94471'
          - '30673'
          - '225651'
      - name: CREDITS
        synonyms:
          - allocations
          - allowances
          - amounts
          - balances
          - points
          - quotas
          - tokens
          - totals
          - units
        description: The amount of credits earned or consumed by a search account, represented as a decimal value.
        expr: CREDITS
        data_type: FLOAT
        sample_values:
          - '0.00506691'
          - '0.000394097'
          - '0.02921568'
      - name: SERVICE_ID
        synonyms:
          - service_code
          - service_identifier
          - service_key
          - service_number
          - service_reference
        description: Unique identifier for a service provided by the organization, used to track and manage credits associated with each service.
        expr: SERVICE_ID
        data_type: NUMBER(38,0)
        sample_values:
          - '32487974729'
          - '1556218628'
          - '211962656'
      - name: SI_CREDITS
        synonyms:
          - systems_integrator_credits
          - si_consumption
          - partner_credits
        description: Credits consumed by Systems Integrator usage.
        expr: SI_CREDITS
        data_type: FLOAT
      - name: AGENT_CREDITS
        synonyms:
          - cortex_agent_credits
          - agent_consumption
        description: Credits consumed by Cortex Agent usage.
        expr: AGENT_CREDITS
        data_type: FLOAT
      - name: ANALYST_CREDITS
        synonyms:
          - cortex_analyst_credits
          - analyst_consumption
        description: Credits consumed by Cortex Analyst queries.
        expr: ANALYST_CREDITS
        data_type: FLOAT
      - name: DIRECT_CREDITS
        synonyms:
          - direct_customer_credits
          - direct_consumption
        description: Credits consumed by direct customer usage.
        expr: DIRECT_CREDITS
        data_type: FLOAT
      - name: UNATTRIBUTED_CREDITS
        synonyms:
          - other_credits
          - unclassified_credits
        description: Credits that could not be attributed to a specific category.
        expr: UNATTRIBUTED_CREDITS
        data_type: FLOAT
    primary_key:
      columns:
        - DS
        - SERVICE_ID
        - ACCOUNT_ID
        - DEPLOYMENT
  - name: CORTEX_SEARCH_DAILY_ACTIVE_SERVICES
    synonyms:
      - active_services
      - cortex_daily_services
      - cortex_search_daily
      - cortex_search_services
      - daily_active_services
      - daily_services
    description: This table has a daily snapshot of every cortex search service. It has metadata about the service. It does not contain information about queries to the services.
    base_table:
      database: SNOWSCIENCE
      schema: LLM
      table: CORTEX_SEARCH_DAILY_ACTIVE_SERVICES
