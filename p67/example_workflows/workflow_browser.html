<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Browser</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            color: #333333;
        }

        #main-container {
            display: flex;
            height: 100vh;
        }

        /* Left Panel - Folders */
        #left-panel {
            width: 250px;
            background: #f5f5f5;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        #left-panel-header {
            padding: 15px;
            background: #e0e0e0;
            border-bottom: 1px solid #cccccc;
            font-weight: 600;
            font-size: 14px;
        }

        #folder-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .folder-item {
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .folder-item:hover {
            background: #e8e8e8;
        }

        .folder-item.active {
            background: #0e639c;
            color: white;
        }

        .folder-icon {
            font-size: 16px;
        }

        /* Middle Panel - Diagram and Node Properties */
        #middle-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        #diagram-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #e0e0e0;
        }

        #diagram-controls {
            padding: 10px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-btn {
            padding: 6px 12px;
            background: #e0e0e0;
            border: 1px solid #cccccc;
            border-radius: 4px;
            color: #333333;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: #d0d0d0;
        }

        #diagram-container {
            flex: 1;
            overflow: auto;
            position: relative;
            cursor: grab;
            background: #ffffff;
        }

        #diagram-container.grabbing {
            cursor: grabbing;
        }

        #mermaid-wrapper {
            transform-origin: 0 0;
            transition: transform 0.1s ease-out;
            padding: 20px;
            display: inline-block;
            min-width: 100%;
            min-height: 100%;
        }

        #mermaid-diagram {
            display: inline-block;
        }

        #properties-section {
            height: 250px;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        #properties-header {
            padding: 10px 15px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 600;
            font-size: 14px;
        }

        #properties-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .property-item {
            margin-bottom: 12px;
        }

        .property-label {
            font-weight: 600;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .property-value {
            font-size: 14px;
            color: #333;
        }

        /* Right Panel - Agent Chat */
        #right-panel {
            width: 400px;
            background: #ffffff;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        #chat-header {
            padding: 15px;
            background: #0e639c;
            color: white;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #new-session-btn {
            padding: 5px 12px;
            background: #ffffff;
            color: #0e639c;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            max-width: 90%;
        }

        .message.user {
            background: #0e639c;
            color: white;
            margin-left: auto;
        }

        .message.agent {
            background: #e8e8e8;
            color: #333;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            font-size: 13px;
            text-align: center;
            max-width: 100%;
        }

        #chat-input-container {
            padding: 15px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
        }

        #chat-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }

        #send-btn {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        #send-btn:hover {
            background: #1177bb;
        }

        #send-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        #status-bar {
            padding: 5px 15px;
            background: #007acc;
            color: white;
            font-size: 12px;
            text-align: center;
        }

        #status-bar.hidden {
            display: none;
        }

        #status-bar.error {
            background: #e74856;
        }

        #status-bar.success {
            background: #16825d;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <!-- Left Panel: Folder List -->
        <div id="left-panel">
            <div id="left-panel-header">Project Folders</div>
            <div id="folder-list">
                <div style="padding: 15px; text-align: center; color: #888;">Loading folders...</div>
            </div>
        </div>

        <!-- Middle Panel: Diagram and Properties -->
        <div id="middle-panel">
            <!-- Workflow Diagram -->
            <div id="diagram-section">
                <div id="diagram-controls">
                    <button class="control-btn" id="zoom-in">Zoom In (+)</button>
                    <button class="control-btn" id="zoom-out">Zoom Out (-)</button>
                    <button class="control-btn" id="reset-view">Reset View</button>
                    <span style="margin-left: auto; color: #888; font-size: 13px;">Drag to pan • Scroll to zoom</span>
                </div>
                <div id="diagram-container">
                    <div id="mermaid-wrapper">
                        <div id="mermaid-diagram" class="mermaid">
                            graph TD
                            A[Select a folder to view workflow]
                        </div>
                    </div>
                </div>
            </div>

            <!-- Node Properties -->
            <div id="properties-section">
                <div id="properties-header">Node Properties</div>
                <div id="properties-content">
                    <div style="color: #888; font-size: 13px;">Select a node from the diagram to view properties</div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Agent Chat -->
        <div id="right-panel">
            <div id="chat-header">
                <span>Agent Chat</span>
                <button id="new-session-btn">New Session</button>
            </div>
            <div id="chat-messages">
                <div class="message system">Welcome! Select a folder to start.</div>
            </div>
            <div id="chat-input-container">
                <textarea id="chat-input" placeholder="Type your message to the agent..."></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <div id="status-bar" class="hidden"></div>

    <script>
        // ============================================================================
        // CONFIGURATION
        // ============================================================================
        const CONFIG = {
            zoom: { min: 0.5, max: 3, step: 0.2, wheelStep: 0.1 },
            fastServerUrl: 'http://localhost:8765',  // FastAPI server URL
        };

        // ============================================================================
        // STATE MANAGEMENT
        // ============================================================================
        const state = {
            currentFolder: null,
            currentSessionId: null,
            workflowData: {},
            edgesData: [],
            selectedNode: null,
            websocket: null,
            diagram: {
                scale: 1,
                isPanning: false,
                startX: 0,
                startY: 0,
                translateX: 0,
                translateY: 0,
                container: null,
                wrapper: null
            }
        };

        // Initialize Mermaid
        mermaid.initialize({
            startOnLoad: true,
            theme: 'default',
            themeVariables: {
                primaryColor: '#0e639c',
                primaryTextColor: '#000',
                primaryBorderColor: '#1177bb',
                lineColor: '#555',
                secondaryColor: '#f5f5f5',
                tertiaryColor: '#ffffff'
            }
        });

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        async function initializeApp() {
            console.log('Initializing application');

            state.diagram.container = document.getElementById('diagram-container');
            state.diagram.wrapper = document.getElementById('mermaid-wrapper');

            initializeZoomControls();
            initializePanControls();
            initializeChatHandlers();

            await loadFolders();
        }

        function initializeZoomControls() {
            document.getElementById('zoom-in').addEventListener('click', () => {
                state.diagram.scale = Math.min(state.diagram.scale + CONFIG.zoom.step, CONFIG.zoom.max);
                updateDiagramTransform();
            });

            document.getElementById('zoom-out').addEventListener('click', () => {
                state.diagram.scale = Math.max(state.diagram.scale - CONFIG.zoom.step, CONFIG.zoom.min);
                updateDiagramTransform();
            });

            document.getElementById('reset-view').addEventListener('click', () => {
                state.diagram.scale = 1;
                state.diagram.translateX = 0;
                state.diagram.translateY = 0;
                updateDiagramTransform();
            });

            state.diagram.container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -CONFIG.zoom.wheelStep : CONFIG.zoom.wheelStep;
                state.diagram.scale = Math.max(CONFIG.zoom.min, Math.min(CONFIG.zoom.max, state.diagram.scale + delta));
                updateDiagramTransform();
            });
        }

        function initializePanControls() {
            state.diagram.container.addEventListener('mousedown', (e) => {
                if (e.target.closest('.mermaid-node')) return;
                state.diagram.isPanning = true;
                state.diagram.startX = e.clientX - state.diagram.translateX;
                state.diagram.startY = e.clientY - state.diagram.translateY;
                state.diagram.container.classList.add('grabbing');
            });

            document.addEventListener('mousemove', (e) => {
                if (!state.diagram.isPanning) return;
                state.diagram.translateX = e.clientX - state.diagram.startX;
                state.diagram.translateY = e.clientY - state.diagram.startY;
                updateDiagramTransform();
            });

            document.addEventListener('mouseup', () => {
                state.diagram.isPanning = false;
                state.diagram.container.classList.remove('grabbing');
            });
        }

        function initializeChatHandlers() {
            document.getElementById('send-btn').addEventListener('click', sendChatMessage);
            document.getElementById('chat-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatMessage();
                }
            });

            document.getElementById('new-session-btn').addEventListener('click', createNewSession);
        }

        function updateDiagramTransform() {
            if (state.diagram.wrapper) {
                const { translateX, translateY, scale } = state.diagram;
                state.diagram.wrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }
        }

        // ============================================================================
        // FOLDER MANAGEMENT
        // ============================================================================

        async function loadFolders() {
            showStatus('Loading folders...', 'info');

            try {
                const response = await fetch('/api/folders');
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                displayFolders(data.folders);
                hideStatus();
            } catch (error) {
                console.error('Error loading folders:', error);
                showStatus(`Error loading folders: ${error.message}`, 'error');
            }
        }

        function displayFolders(folders) {
            const folderList = document.getElementById('folder-list');

            if (folders.length === 0) {
                folderList.innerHTML = '<div style="padding: 15px; text-align: center; color: #888;">No folders found</div>';
                return;
            }

            folderList.innerHTML = '';
            folders.forEach(folder => {
                const folderItem = document.createElement('div');
                folderItem.className = 'folder-item';
                folderItem.innerHTML = `
                    <span class="folder-icon">📁</span>
                    <span>${folder.name}</span>
                `;
                folderItem.addEventListener('click', () => selectFolder(folder));
                folderList.appendChild(folderItem);
            });
        }

        async function selectFolder(folder) {
            showStatus(`Loading workflow from ${folder.name}...`, 'info');

            try {
                // Change directory on the server
                const response = await fetch('/api/chdir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder: folder.path })
                });

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.error || 'Failed to change directory');
                }

                // Update UI
                document.querySelectorAll('.folder-item').forEach(item => item.classList.remove('active'));
                event.currentTarget.classList.add('active');

                state.currentFolder = folder;

                // Create new chat session for this folder
                await createNewSession();

                // Load workflow
                await loadWorkflow();

                showStatus(`Loaded workflow from ${folder.name}`, 'success');
                setTimeout(hideStatus, 2000);

            } catch (error) {
                console.error('Error selecting folder:', error);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }

        // ============================================================================
        // WORKFLOW LOADING
        // ============================================================================

        async function loadWorkflow() {
            try {
                const response = await fetch('src/workflow.ts');
                if (!response.ok) {
                    throw new Error('Workflow file not found in this folder');
                }

                const workflowCode = await response.text();
                parseWorkflowAndGenerateDiagram(workflowCode);

            } catch (error) {
                console.error('Error loading workflow:', error);
                // Show placeholder diagram
                const diagramDiv = document.getElementById('mermaid-diagram');
                diagramDiv.textContent = 'graph TD\nA[No workflow found in this folder]';
                diagramDiv.removeAttribute('data-processed');
                await mermaid.run({ nodes: [diagramDiv] });
            }
        }

        function parseWorkflowAndGenerateDiagram(workflowCode) {
            // Simple parsing - extract nodes and edges
            state.workflowData = {};
            state.edgesData = [];

            const nodes = [];
            const edges = [];
            let entryPoint = null;

            // Extract nodes
            const nodeRegex = /workflow\.addNode\s*\(\s*['"](\w+)['"]/g;
            let match;
            while ((match = nodeRegex.exec(workflowCode)) !== null) {
                nodes.push(match[1]);
                state.workflowData[match[1]] = {
                    name: match[1],
                    type: 'action',
                    description: `Node: ${match[1]}`
                };
            }

            // Extract entry point
            const entryRegex = /workflow\.setEntryPoint\s*\(\s*['"](\w+)['"]/;
            const entryMatch = workflowCode.match(entryRegex);
            if (entryMatch) {
                entryPoint = entryMatch[1];
            }

            // Extract edges
            const edgeRegex = /workflow\.addEdge\s*\(\s*['"](\w+)['"]\s*,\s*['"](\w+)['"]/g;
            while ((match = edgeRegex.exec(workflowCode)) !== null) {
                edges.push({ from: match[1], to: match[2] });
            }

            // Extract conditional edges
            const condRegex = /workflow\.addConditionalEdges\s*\(\s*['"](\w+)['"]\s*,\s*(\w+)\s*,\s*\{([^}]+)\}/g;
            while ((match = condRegex.exec(workflowCode)) !== null) {
                const sourceNode = match[1];
                const branchesStr = match[3];
                const branchRegex = /(['"]?)(\w+)\1\s*:\s*['"](\w+)['"]/g;
                let branchMatch;

                while ((branchMatch = branchRegex.exec(branchesStr)) !== null) {
                    edges.push({
                        from: sourceNode,
                        to: branchMatch[3],
                        label: branchMatch[2]
                    });
                }
            }

            state.edgesData = edges;

            // Generate mermaid diagram
            const mermaidCode = generateMermaidCode(nodes, edges, entryPoint);
            renderMermaidDiagram(mermaidCode);
        }

        function generateMermaidCode(nodes, edges, entryPoint) {
            const lines = ['graph TD'];

            // Add start node
            lines.push('    start([Start])');

            // Add all nodes
            nodes.forEach(node => {
                const label = node.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                lines.push(`    ${node}[${label}]`);
            });

            // Add start edge
            if (entryPoint) {
                lines.push(`    start --> ${entryPoint}`);
            }

            // Add all edges
            edges.forEach(edge => {
                if (edge.label) {
                    lines.push(`    ${edge.from} -->|${edge.label}| ${edge.to}`);
                } else {
                    lines.push(`    ${edge.from} --> ${edge.to}`);
                }
            });

            return lines.join('\n');
        }

        async function renderMermaidDiagram(mermaidCode) {
            const diagramDiv = document.getElementById('mermaid-diagram');
            diagramDiv.textContent = mermaidCode;
            diagramDiv.removeAttribute('data-processed');

            await mermaid.run({ nodes: [diagramDiv] });

            setupNodeInteractions();
        }

        function setupNodeInteractions() {
            setTimeout(() => {
                const nodes = document.querySelectorAll('#mermaid-diagram .node');
                nodes.forEach(node => {
                    node.classList.add('mermaid-node');
                    node.style.cursor = 'pointer';

                    node.addEventListener('click', () => {
                        const nodeId = extractNodeId(node);
                        if (nodeId && state.workflowData[nodeId]) {
                            showNodeProperties(nodeId);
                        }
                    });
                });
            }, 100);
        }

        function extractNodeId(node) {
            const nodeElement = node.closest('[id^="flowchart-"]');
            if (nodeElement) {
                const id = nodeElement.id.replace('flowchart-', '').replace(/-\d+$/, '');
                if (state.workflowData[id]) return id;
            }
            return null;
        }

        function showNodeProperties(nodeId) {
            state.selectedNode = nodeId;
            const nodeData = state.workflowData[nodeId];

            const propertiesContent = document.getElementById('properties-content');
            propertiesContent.innerHTML = `
                <div class="property-item">
                    <div class="property-label">Node Name</div>
                    <div class="property-value">${nodeData.name}</div>
                </div>
                <div class="property-item">
                    <div class="property-label">Type</div>
                    <div class="property-value">${nodeData.type}</div>
                </div>
                <div class="property-item">
                    <div class="property-label">Description</div>
                    <div class="property-value">${nodeData.description}</div>
                </div>
            `;
        }

        // ============================================================================
        // CHAT MANAGEMENT
        // ============================================================================

        async function createNewSession() {
            showStatus('Creating new chat session...', 'info');

            try {
                const workdir = state.currentFolder ? state.currentFolder.path : undefined;

                const response = await fetch(`${CONFIG.fastServerUrl}/api/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ workdir })
                });

                const data = await response.json();
                if (data.status !== 'success') {
                    throw new Error('Failed to create session');
                }

                state.currentSessionId = data.session_id;

                // Connect to WebSocket
                connectWebSocket(data.websocket_url);

                // Clear chat and show system message
                const chatMessages = document.getElementById('chat-messages');
                chatMessages.innerHTML = '';
                addChatMessage('system', `New session created for folder: ${state.currentFolder?.name || 'root'}`);

                showStatus('Session created successfully', 'success');
                setTimeout(hideStatus, 2000);

            } catch (error) {
                console.error('Error creating session:', error);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }

        function connectWebSocket(wsUrl) {
            if (state.websocket) {
                state.websocket.close();
            }

            state.websocket = new WebSocket(wsUrl);

            state.websocket.onopen = () => {
                console.log('WebSocket connected');
            };

            state.websocket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (error) {
                    console.error('Error parsing WebSocket message:', error);
                }
            };

            state.websocket.onerror = (error) => {
                console.error('WebSocket error:', error);
                addChatMessage('system', 'Connection error occurred');
            };

            state.websocket.onclose = () => {
                console.log('WebSocket disconnected');
            };
        }

        function handleWebSocketMessage(data) {
            if (data.type === 'output') {
                // Parse the output JSON
                try {
                    const outputData = JSON.parse(data.content);
                    if (outputData.type === 'event') {
                        const eventData = outputData.data;

                        if (eventData.type === 'text_delta' || eventData.type === 'text') {
                            const text = eventData.text || eventData.content || '';
                            appendToLastAgentMessage(text);
                        } else if (eventData.type === 'thinking_delta') {
                            // Optionally show thinking
                            console.log('Thinking:', eventData.content);
                        }
                    }
                } catch (error) {
                    // If not JSON, just display as text
                    appendToLastAgentMessage(data.content);
                }
            } else if (data.type === 'error') {
                addChatMessage('system', `Error: ${data.error || data.content}`);
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message) return;

            if (!state.currentSessionId) {
                showStatus('No active session. Please select a folder first.', 'error');
                return;
            }

            // Add user message to chat
            addChatMessage('user', message);
            input.value = '';

            // Start a new agent message
            addChatMessage('agent', '');

            // Send via WebSocket
            if (state.websocket && state.websocket.readyState === WebSocket.OPEN) {
                state.websocket.send(JSON.stringify({
                    type: 'input',
                    content: message
                }));
            } else {
                addChatMessage('system', 'Connection lost. Please create a new session.');
            }
        }

        function addChatMessage(type, content) {
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = content;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendToLastAgentMessage(text) {
            const chatMessages = document.getElementById('chat-messages');
            const lastMessage = chatMessages.lastElementChild;

            if (lastMessage && lastMessage.classList.contains('agent')) {
                lastMessage.textContent += text;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } else {
                addChatMessage('agent', text);
            }
        }

        // ============================================================================
        // STATUS HELPERS
        // ============================================================================

        function showStatus(message, type) {
            const statusBar = document.getElementById('status-bar');
            statusBar.textContent = message;
            statusBar.className = type;
            statusBar.classList.remove('hidden');
        }

        function hideStatus() {
            document.getElementById('status-bar').classList.add('hidden');
        }

        // ============================================================================
        // START APPLICATION
        // ============================================================================

        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
