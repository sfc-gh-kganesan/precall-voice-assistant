spec:
    containers:
        - name: controld
          image: /p67_src/core/img_repo/controld:latest
          volumeMounts:
              - name: local-storage
                mountPath: /opt/local-storage
          env:
              PORT: 80
              DATA_ROOT: /opt/local-storage
              P67_RUNNER_IMAGE: /p67_src/core/img_repo/p67-runner:latest
              SNOWFLAKE_WEBHOOK_SECRET: p67-webhook-secret-token
              SECRET_BACKEND: snowflake
          resources:
              requests:
                  memory: 512Mi
                  cpu: 0.5
              limits:
                  memory: 1Gi
                  cpu: 1
          secrets:
              - snowflakeSecret:
                    objectReference: google_oauth_client_id
                directoryPath: /opt/creds/google_oauth_client_id
              - snowflakeSecret:
                    objectReference: google_oauth_client_secret
                directoryPath: /opt/creds/google_oauth_client_secret
              - snowflakeSecret:
                    objectReference: postgres_connection_url
                directoryPath: /opt/creds/postgres_connection_url
              - snowflakeSecret:
                    objectReference: encryption_key
                directoryPath: /opt/creds/encryption_key
              - snowflakeSecret:
                    objectReference: slack_bot_token
                directoryPath: /opt/creds/slack_bot_token
              - snowflakeSecret:
                    objectReference: slack_app_token
                directoryPath: /opt/creds/slack_app_token
              - snowflakeSecret:
                    objectReference: slack_signing_secret
                directoryPath: /opt/creds/slack_signing_secret
    volumes:
        - name: local-storage
          source: block
          size: 1Gi
    endpoints:
        - name: web
          port: 80
          public: true
serviceRoles:
    - name: webhook_caller
      endpoints:
          - web
