spec:
    containers:
        - name: controld
          image: /p67_src/core/img_repo/controld:latest
          volumeMounts:
              - name: local-storage
                mountPath: /opt/local-storage
          env:
              PORT: 80
              DATA_ROOT: /opt/local-storage
              GOOGLE_REDIRECT_URI: https://jnb46h6e-sfengineering-aifde.snowflakecomputing.app/api/auth/google/callback
          resources:
              requests:
                  memory: 512Mi
                  cpu: 0.5
              limits:
                  memory: 1Gi
                  cpu: 1
          secrets:
              - snowflakeSecret:
                    objectReference: google_oauth_client_id
                directoryPath: /opt/creds/google_oauth_client_id
              - snowflakeSecret:
                    objectReference: google_oauth_client_secret
                directoryPath: /opt/creds/google_oauth_client_secret
    volumes:
        - name: local-storage
          source: block
          size: 1Gi
    endpoints:
        - name: web
          port: 80
          public: true
