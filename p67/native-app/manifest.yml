manifest_version: 2

version:
    name: V1
    label: "v1"

configuration:
    grant_callback: v1.create_services

artifacts:
    readme: README.md
    setup_script: setup.sql

    default_web_endpoint:
        service: app.dashboard
        endpoint: web

    container_services:
        images:
            - /p67_src/core/img_repo/controld:latest
            - /p67_src/core/img_repo/p67-runner:latest
            - /p67_src/dash/img_repo/p67-dash:latest

references:
    - google_oauth_eai:
          label: "Google Oauth Access Integration"
          description: "External Access Integration for Egress from Native App + SPCS"
          privileges: [USAGE]
          object_type: EXTERNAL_ACCESS_INTEGRATION
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - google_oauth_client_id:
          label: "OAuth2 Client ID for Google"
          description: "Secret holding OAuth2 Client ID for the external Google provider"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - google_oauth_client_secret:
          label: "OAuth2 Client Secret for Google"
          description: "Secret holding OAuth2 Client Secret for the external Google provider"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - snowflake_egress_eai:
          label: "Snowflake Egress Access Integration"
          description: "External Access Integration for Egress to Snowflake APIs (Cortex, SQL, etc.)"
          privileges: [USAGE]
          object_type: EXTERNAL_ACCESS_INTEGRATION
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - postgres_eai:
          label: "Postgres Access Integration"
          description: "External Access Integration for Egress to Snowflake Postgres service"
          privileges: [USAGE]
          object_type: EXTERNAL_ACCESS_INTEGRATION
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - postgres_connection_url:
          label: "Postgres connection URL"
          description: "Secret holding Postgres connection URL (which includes username/password)"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - encryption_key:
          label: "Encryption key for secrets"
          description: "Secret holding Base64-encoded 32-byte AES-256 key used to encrypt user secrets at rest"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - slack_bot_token:
          label: "Slack Bot Token"
          description: "Secret holding Slack Bot Token (xoxb-...) for posting messages to Slack channels"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: false
    - slack_app_token:
          label: "Slack App Token (Socket Mode)"
          description: "Secret holding Slack App-Level Token (xapp-...) for Socket Mode WebSocket connection"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: false
    - slack_signing_secret:
          label: "Slack Signing Secret"
          description: "Secret holding Slack Signing Secret for verifying inbound webhook requests from Slack"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: false

lifecycle_callbacks:
    version_initializer: v1.init

privileges:
    - CREATE COMPUTE POOL:
          description: "Enable application to create its own compute pool(s)"
    - BIND SERVICE ENDPOINT:
          description: "Enables application to expose service endpoints"
    - CREATE WAREHOUSE:
          description: "Enables application to create its own warehouse(s)"
