manifest_version: 2

version:
    name: V1
    label: "v1"

configuration:
    grant_callback: v1.create_services

artifacts:
    readme: README.md
    setup_script: setup.sql

    default_web_endpoint:
        service: app.controld
        endpoint: web

    container_services:
        images:
            - /p67_src/core/img_repo/controld:latest

references:
    - google_oauth_eai:
          label: "Google Oauth Access Integration"
          description: "External Access Integration for Egress from Native App + SPCS"
          privileges: [USAGE]
          object_type: EXTERNAL_ACCESS_INTEGRATION
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - google_oauth_client_id:
          label: "OAuth2 Client ID for Google"
          description: "Secret holding OAuth2 Client ID for the external Google provider"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - google_oauth_client_secret:
          label: "OAuth2 Client Secret for Google"
          description: "Secret holding OAuth2 Client Secret for the external Google provider"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - postgres_eai:
          label: "Postgres Access Integration"
          description: "External Access Integration for Egress to Snowflake Postgres service"
          privileges: [USAGE]
          object_type: EXTERNAL_ACCESS_INTEGRATION
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true
    - postgres_connection_url:
          label: "Postgres connection URL"
          description: "Secret holding Postgres connection URL (which includes username/password)"
          privileges:
              - READ
          object_type: SECRET
          register_callback: v1.register_reference
          configuration_callback: v1.configure_reference
          required_at_setup: true

lifecycle_callbacks:
    version_initializer: v1.init

privileges:
    - CREATE COMPUTE POOL:
          description: "Enable application to create its own compute pool(s)"
    - BIND SERVICE ENDPOINT:
          description: "Enables application to expose service endpoints"
    - CREATE WAREHOUSE:
          description: "Enables application to create its own warehouse(s)"
