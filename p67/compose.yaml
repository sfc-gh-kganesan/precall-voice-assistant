services:
    postgres:
        image: postgres:17-alpine
        container_name: p67-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: controld_dev
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5

    controld:
        build:
            context: .
            target: runner
            args:
                SERVICE_NAME: controld
                SERVICE_PORT: 3002
        ports:
            - "3002:3002"
        environment:
            DATA_ROOT: /app/services/controld/.local-storage
            DATABASE_URL: postgresql://postgres:password@postgres:5432/controld_dev?schema=public
            # Generate with: openssl rand -base64 32
            ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
            NODE_ENV: development
            DEBUG_ENABLE_DEFAULT_USER: true
            DEBUG_DEFAULT_USER: bobthebuilder
            # Slack Socket Mode - get app token from Slack app settings → App-Level Tokens
            SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
            # Slack Bot Token - get from OAuth & Permissions → Bot User OAuth Token
            SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
            # Sandbox mode: run Python workflows inside p67-runner container
            P67_SANDBOX_MODE: ${P67_SANDBOX_MODE:-false}
            P67_RUNNER_IMAGE: ${P67_RUNNER_IMAGE:-p67-runner:latest}
            P67_HOST_STORAGE_ROOT: ${PWD}/services/controld/.data_root
        volumes:
            - ./services/controld/.data_root:/app/services/controld/.local-storage
            # Docker socket for spawning p67-runner containers (sandbox mode)
            - /var/run/docker.sock:/var/run/docker.sock
        depends_on:
            postgres:
                condition: service_healthy
        command: sh -c "cd /app/services/controld && node dist/index.js"

volumes:
    postgres_data:
