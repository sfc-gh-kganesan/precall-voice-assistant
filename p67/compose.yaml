services:
    postgres:
        image: postgres:17-alpine
        container_name: p67-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: controld_dev
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5

    controld:
        build:
            context: .
            target: runner
            args:
                SERVICE_NAME: controld
                SERVICE_PORT: 3002
        ports:
            - "3002:3002"
        environment:
            DATA_ROOT: /app/services/controld/.local-storage
            DATABASE_URL: postgresql://postgres:password@postgres:5432/controld_dev?schema=public
            # Generate with: openssl rand -base64 32
            ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
            NODE_ENV: development
            DEBUG_ENABLE_DEFAULT_USER: true
            DEBUG_DEFAULT_USER: bobthebuilder
        volumes:
            - ./services/controld/.data_root:/app/services/controld/.local-storage
        depends_on:
            postgres:
                condition: service_healthy
        command: sh -c "cd /app/services/controld && node dist/index.js"

volumes:
    postgres_data:
