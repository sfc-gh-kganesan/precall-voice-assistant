version: '3.8'

services:
  fde-dda-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fde-dda-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount app directory for hot reload during development
      - ./app:/app/app
    restart: unless-stopped
    command: ["uv", "run", "app/mcp/dda_server.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dda-network

  glean-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glean-proxy
    ports:
      - "8006:8006"  # Main proxy server
      - "8092:8092"  # OAuth callback (socat forwards to 127.0.0.1:8091)
    env_file:
      - .env
    environment:
      - OAUTH_INTERNAL_PORT=8091  # FastMCP binds here
      - OAUTH_PUBLIC_PORT=8092    # Browser redirects here (via socat)
    volumes:
      - ./app:/app/app
      - glean-tokens:/home/appuser/.local/share/fastmcp  # Persist OAuth tokens
    restart: unless-stopped
    command: >
      sh -c "socat TCP-LISTEN:8092,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:8091 &
      uv run app/mcp/glean_proxy.py"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dda-network

  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dda-agent-api
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      # Mount app directory for hot reload during development
      - ./app:/app/app
    restart: unless-stopped
    command: ["uv", "run", "app/interfaces/api.py"]
    depends_on:
      fde-dda-service:
        condition: service_healthy
      glean-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dda-network

networks:
  dda-network:
    driver: bridge

volumes:
  glean-tokens:
    driver: local

