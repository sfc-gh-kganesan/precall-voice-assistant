version: '3.8'

services:
  fde-dda-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fde-dda-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount app directory for hot reload during development
      - ./app:/app/app
    restart: unless-stopped
    command: ["uv", "run", "app/mcp/dda_server.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
