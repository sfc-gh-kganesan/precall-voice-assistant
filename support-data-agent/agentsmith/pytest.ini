[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage settings
addopts =
    --strict-markers
    --cov=backend
    --cov-report=term-missing
    --cov-report=html
    -v

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
