spec:
    containers:
        - name: collector
          image: /invoiceiq/service/image_repository/invoiceiq-collector:latest
          readinessProbe:
              port: 8000
              path: /health
          env:
              SNOWFLAKE_WAREHOUSE: compute_wh
              SNOWFLAKE_ROLE: invoiceiq_admin
    endpoints:
        - name: collector
          port: 8000
          public: true
