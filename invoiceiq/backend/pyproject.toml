[project]
name = "invoiceiq-backend"
version = "1.0.0"
description = "InvoiceIQ Backend API Service"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "snowflake-connector-python>=3.12.0",
    "pydantic>=2.9.0",
    "python-multipart>=0.0.9",
    "python-dotenv>=1.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.3",
    "httpx>=0.27.2",
    "ruff>=0.8.0",
    "pyright>=1.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pyright]
typeCheckingMode = "basic"
reportOptionalSubscript = "none"
reportAttributeAccessIssue = "none"
reportCallIssue = "none"
reportArgumentType = "none"
reportPossiblyUnboundVariable = "none"

[tool.ruff]
# Exclude auto-generated or vendored code
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*.egg-info",
]

# Set line length (88 is ruff default, 120 is common for teams)
line-length = 88

# Assume Python 3.11+ (matches requires-python)
target-version = "py311"

[tool.ruff.lint]
# Use minimal rule set as per aura coding standards
# See: https://docs.astral.sh/ruff/rules/
select = ["E4", "E7", "E9", "F"]


