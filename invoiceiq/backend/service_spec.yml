spec:
    containers:
        - name: backend
          image: /invoiceiq/service/image_repository/invoiceiq-backend:latest
          readinessProbe:
              port: 8001
              path: /health
          env:
              SNOWFLAKE_WAREHOUSE: compute_wh
              SNOWFLAKE_ROLE: invoiceiq_admin
              AGENT_SERVICE_URL: http://invoice-processing-service.ivzu.svc.spcs.internal:8000
    endpoints:
        - name: backend
          port: 8001
          public: true
