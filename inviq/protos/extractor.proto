syntax = "proto3";

package extractor;

service Extractor {
  rpc Extract(stream FileChunk) returns (ExtractResponse);
}

message FileChunk {
  string filename = 1;
  bytes content = 2;
  bool is_last = 3;
}

message ExtractResponse {
  bool success = 1;
  string message = 2;
  string file_id = 3;
  string purchase_order_number = 4;
  string payment_terms = 5;
  string total_amount = 6;
  string vendor_name = 7;
  string furl = 8;
}
