syntax = "proto3";

package extractor;

service Extractor {
  rpc Extract(stream FileChunk) returns (ExtractResponse);
}

message FileChunk {
  string filename = 1;
  bytes content = 2;
  bool is_last = 3;
}

message ExtractResponse {
  bool success = 1;
  string message = 2;
  string file_id = 3;
  string purchase_order_number = 4;
  string payment_terms = 5;
  string total_amount = 6;
  string vendor_name = 7;
  string furl = 8;
  string banking_details = 9;
  string due_date = 10;
  string freight_shipping_amount = 11;
  string invoice_currency = 12;
  string invoice_date = 13;
  string invoice_number = 14;
  string memo_description = 15;
  string payment_type = 16;
  bool prepaid_flag = 17;
  string quantity = 18;
  string service_end_date = 19;
  string service_start_date = 20;
  string shipped_to_address = 21;
  string snowflake_entity = 22;
  string snowflake_tax_id = 23;
  string tax_amount = 24;
  string unit_price = 25;
  string vendor_address = 26;
  string vendor_tax_id = 27;
}
