syntax = "proto3";

package invoicestore;

service InvoiceStore {
  rpc Submit(SubmissionRequest) returns (SubmissionResponse);
  rpc GetSubmission(GetSubmissionRequest) returns (GetSubmissionResponse);
  rpc GetOldestPendingSubmission(GetOldestPendingSubmissionRequest) returns (GetOldestPendingSubmissionResponse);
  rpc CreateInvoice(CreateInvoiceRequest) returns (CreateInvoiceResponse);
  rpc RejectInvoice(RejectInvoiceRequest) returns (RejectInvoiceResponse);
  rpc ApproveInvoice(ApproveInvoiceRequest) returns (ApproveInvoiceResponse);
  rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);
}

message SubmissionRequest {
  string lift_ticket = 1;
  repeated string file_ids = 2;
}

message SubmissionResponse {
  bool success = 1;
  string message = 2;
  SubmissionStatus status = 3;
}

message GetSubmissionRequest {
  string lift_ticket = 1;
}

message GetSubmissionResponse {
  bool success = 1;
  string message = 2;
  repeated string file_ids = 3;
  SubmissionStatus status = 4;
}

message GetOldestPendingSubmissionRequest {
}

message GetOldestPendingSubmissionResponse {
  bool success = 1;
  string message = 2;
  string lift_ticket = 3;
  repeated string file_ids = 4;
}

enum SubmissionStatus {
  SUBMISSION_STATUS_UNKNOWN = 0;
  SUBMISSION_STATUS_PENDING = 1;
  SUBMISSION_STATUS_PROCESSING = 2;
  SUBMISSION_STATUS_COMPLETED = 3;
  SUBMISSION_STATUS_REJECTED = 4;
}

message CreateInvoiceRequest {
  string lift_ticket = 1;
  string file_id = 2;
  string vendor_name = 3;
  string invoice_number = 4;
  string invoice_date = 5;
  string total_amount = 6;
  string purchase_order_number = 7;
  string banking_details = 8;
  string payment_terms = 9;
  string memo_description = 10;
  string shipped_to_address = 11;
  string service_start_date = 12;
  string service_end_date = 13;
  string quantity = 14; 
  string unit_price = 15;
  string payment_type = 16;
  string due_date = 17;
  string vendor_tax_id = 18;
  string snowflake_tax_id = 19;
  string prepaid_flag = 20;
}

message CreateInvoiceResponse {
  bool success = 1;
  string message = 2;
  int32 invoice_id = 3;
}

message RejectInvoiceRequest {
  int32 invoice_id = 1;
  string reason = 2;
}

message RejectInvoiceResponse {
  bool succes  = 1;
  string message = 2;
}

message ApproveInvoiceRequest {
  int32 invoice_id = 1;
}

message ApproveInvoiceResponse {
  bool succes  = 1;
  string message = 2;
}

enum InvoiceStatus {
  INVOICE_STATUS_UNKNOWN = 0;
  INVOICE_STATUS_PENDING = 1;
  INVOICE_STATUS_APPROVED = 2;
  INVOICE_STATUS_REJECTED = 3;
}

message ListInvoicesRequest {
  // Optional filters
  string status = 1;  // Filter by status: "PENDING", "APPROVED", "REJECTED"
  int32 limit = 2;    // Limit number of results (default: 100)
  int32 offset = 3;   // Offset for pagination
}

message ListInvoicesResponse {
  bool success = 1;
  string message = 2;
  repeated Invoice invoices = 3;
  int32 total_count = 4;  // Total number of invoices (for pagination)
}

message Invoice {
  int32 id = 1;
  string created_at = 2;
  string lift_ticket = 3;
  string file_id = 4;
  string status = 5;
  string status_desc = 6;
  string vendor_name = 7;
  string invoice_number = 8;
  string invoice_date = 9;
  string total_amount = 10;
  string purchase_order_number = 11;
  string banking_details = 12;
  string payment_terms = 13;
  string memo_description = 14;
  string shipped_to_address = 15;
  string service_start_date = 16;
  string service_end_date = 17;
  string quantity = 18;
  string unit_price = 19;
  string payment_type = 20;
  string due_date = 21;
  string vendor_tax_id = 22;
  string snowflake_tax_id = 23;
  string prepaid_flag = 24;
}


